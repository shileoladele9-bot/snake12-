<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake Game - GitHub Style</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --green: #238636;
      --green-hover: #2ea043;
      --red: #f85149;
      --grid: #21262d;
      --snake-head: #3fb950;
      --snake-body: #2ea043;
      --food: #f85149;
      --shadow: rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 12px 30px var(--shadow);
      overflow: hidden;
    }

    .topbar {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .title h1 {
      font-size: 20px;
      margin: 0;
      font-weight: 600;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .score-box {
      background: #0d1117;
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
    }

    .game-area {
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    canvas {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
      max-width: 100%;
      height: auto;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      background: var(--green);
      color: white;
      border: 1px solid rgba(240,246,252,0.1);
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: var(--green-hover);
      transform: translateY(-1px);
    }

    button.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    button.secondary:hover {
      background: #21262d;
    }

    .footer {
      border-top: 1px solid var(--border);
      padding: 16px 22px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: rgba(56, 139, 253, 0.15);
      color: #58a6ff;
      border: 1px solid rgba(56, 139, 253, 0.3);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 8px;
    }

    @media (max-width: 600px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .score-box {
        width: 100%;
        text-align: center;
      }

      .game-area {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title">
        <div>
          <h1>Snake Game <span class="badge">GitHub UI</span></h1>
          <div class="subtitle">Use arrow keys to play</div>
        </div>
      </div>
      <div class="score-box" id="score">Score: 0</div>
    </div>

    <div class="game-area">
      <canvas id="gameCanvas" width="400" height="400"></canvas>

      <div class="controls">
        <button id="restartBtn">Restart</button>
        <button id="pauseBtn" class="secondary">Pause</button>
      </div>
    </div>

    <div class="footer">
      Built with HTML, CSS and JavaScript • GitHub-inspired design
    </div>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreText = document.getElementById("score");
    const restartBtn = document.getElementById("restartBtn");
    const pauseBtn = document.getElementById("pauseBtn");

    const box = 20;
    const canvasSize = 400;
    const rows = canvasSize / box;

    let snake, direction, food, score, game, paused;

    function initGame() {
      snake = [{ x: 9 * box, y: 10 * box }];
      direction = "RIGHT";
      food = randomFood();
      score = 0;
      paused = false;
      scoreText.textContent = "Score: " + score;
      pauseBtn.textContent = "Pause";

      if (game) clearInterval(game);
      game = setInterval(draw, 120);
    }

    function randomFood() {
      return {
        x: Math.floor(Math.random() * rows) * box,
        y: Math.floor(Math.random() * rows) * box
      };
    }

    document.addEventListener("keydown", changeDirection);

    function changeDirection(event) {
      const key = event.key;

      if (key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
      else if (key === "ArrowUp" && direction !== "DOWN") direction = "UP";
      else if (key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
      else if (key === "ArrowDown" && direction !== "UP") direction = "DOWN";
    }

    function collision(head, array) {
      for (let i = 0; i < array.length; i++) {
        if (head.x === array[i].x && head.y === array[i].y) {
          return true;
        }
      }
      return false;
    }

    function drawGrid() {
      ctx.strokeStyle = "#21262d";
      ctx.lineWidth = 1;

      for (let i = 0; i <= canvasSize; i += box) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvasSize);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(canvasSize, i);
        ctx.stroke();
      }
    }

    function draw() {
      if (paused) return;

      ctx.fillStyle = "#0d1117";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawGrid();

      // Draw food
      ctx.fillStyle = "#f85149";
      ctx.fillRect(food.x + 2, food.y + 2, box - 4, box - 4);

      // Draw snake
      for (let i = 0; i < snake.length; i++) {
        ctx.fillStyle = i === 0 ? "#3fb950" : "#2ea043";
        ctx.fillRect(snake[i].x + 1, snake[i].y + 1, box - 2, box - 2);
      }

      let snakeX = snake[0].x;
      let snakeY = snake[0].y;

      if (direction === "LEFT") snakeX -= box;
      if (direction === "UP") snakeY -= box;
      if (direction === "RIGHT") snakeX += box;
      if (direction === "DOWN") snakeY += box;

      if (snakeX === food.x && snakeY === food.y) {
        score++;
        scoreText.textContent = "Score: " + score;
        food = randomFood();
      } else {
        snake.pop();
      }

      const newHead = { x: snakeX, y: snakeY };

      if (
        snakeX < 0 ||
        snakeY < 0 ||
        snakeX >= canvasSize ||
        snakeY >= canvasSize ||
        collision(newHead, snake)
      ) {
        clearInterval(game);
        gameOverScreen();
        return;
      }

      snake.unshift(newHead);
    }

    function gameOverScreen() {
      ctx.fillStyle = "rgba(13, 17, 23, 0.8)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#f85149";
      ctx.font = "bold 32px Arial";
      ctx.textAlign = "center";
      ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2 - 10);

      ctx.fillStyle = "#8b949e";
      ctx.font = "18px Arial";
      ctx.fillText("Final Score: " + score, canvas.width / 2, canvas.height / 2 + 30);
    }

    restartBtn.addEventListener("click", initGame);

    pauseBtn.addEventListener("click", () => {
      paused = !paused;
      pauseBtn.textContent = paused ? "Resume" : "Pause";
    });

    initGame();
  </script>
</body>
</html>
